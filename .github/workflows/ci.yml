name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

      - name: Architectural grep gate (dashboard layer)
        run: |
          if grep -rE "['\"][^'\"]*lib/(versature|pipeline)/" app/ components/ --include='*.ts' --include='*.tsx' 2>/dev/null; then
            echo "ERROR: dashboard code imports from lib/versature or lib/pipeline"
            exit 1
          fi

      - name: Architectural grep gate (warehouse reader layer)
        run: |
          if grep -rE "['\"][^'\"]*lib/(versature|pipeline)/" lib/warehouse/ --include='*.ts' 2>/dev/null; then
            echo "ERROR: lib/warehouse imports from lib/versature or lib/pipeline (would create indirect dashboard->pipeline path)"
            exit 1
          fi

      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run build
